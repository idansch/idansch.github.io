<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IYS Apps</title>
    <meta name="description" content="IYS Apps - Mobile experiences crafted with care.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <header class="hero">
        <div class="hero-content container">
            <div class="hero-shell">
                <div class="hero-copy">
                    <h1>IYS Apps</h1>
                    <p>Innovating mobile experiences, bit by bit.</p>
                    <div class="hero-actions">
                        <a href="echo.html" class="cta-button">Explore Our Apps</a>
                        <button class="support-button" onclick="sendSupportEmail()">Support / Feedback</button>
                    </div>
                </div>
                <div class="hero-stage" aria-hidden="true">
                    <div class="hero-stage-shadow"></div>
                    <div class="stage-beam stage-beam-1"></div>
                    <div class="stage-beam stage-beam-2"></div>
                    <div class="stage-grid"></div>
                    <div class="stage-phone hero-stage-logo-echo">
                        <img src="images/echo-logo.png" alt="" class="hero-stage-logo">
                    </div>
                    <div class="stage-phone hero-stage-logo-boop">
                        <img src="images/boop-logo.png" alt="" class="hero-stage-logo">
                    </div>
                </div>
            </div>
        </div>
    </header>

    <section class="story-section container">
        <details class="story-collapse">
            <summary>The Story</summary>
            <div class="story-content">
                <p>Welcome to Idan’s Studio, where innovation meets design. As a solo developer, I specialize in crafting engaging mobile experiences that delight users.</p>
            </div>
        </details>
    </section>

    <footer class="footer">
        <p>© 2025 IYS Apps. All Rights Reserved.</p>
    </footer>
    <script src="scripts.js"></script>
    <script>
        fetch('header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
                if (window.initializeSiteInteractions) {
                    window.initializeSiteInteractions();
                }
            });
    </script>
</body>
</html>
