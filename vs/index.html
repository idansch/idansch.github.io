<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Invite - IYS Apps</title>
    <meta name="description" content="Open your Echo invite link and download the Echo rhythm game.">
    <link rel="stylesheet" href="../styles.css">
    <style>
        :root {
            --primary-color: #6F00FF;
            --secondary-color: #240046;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="app-detail container">
        <h2>Echo</h2>
        <p>Echo is a sound-based rhythm game where you challenge your timing and memory.</p>

        <section id="invite-section" class="invite-section" style="display: none;">
            <p class="invite-text">
                You’ve opened an Echo invite link. Use the button below to copy your invite code:
            </p>
            <div class="invite-actions">
                <span id="invite-code" class="invite-code"></span>
                <button id="copy-invite-button" class="secondary-button">Copy invite code</button>
            </div>
            <p id="copy-status" class="copy-status" aria-live="polite"></p>
        </section>

        <section class="download-section">
            <button id="download-echo-button" class="cta-button">
                Download Echo on the App Store
            </button>
        </section>
    </main>

    <footer class="footer">
        <p>© 2025 IYS Apps. All Rights Reserved.</p>
    </footer>

    <script>
        // Load the shared header
        fetch('../header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            })
            .catch(() => {
                // Header is non-critical for this flow; fail silently.
            });

        function getInviteCodeFromUrl() {
            try {
                const url = new URL(window.location.href);
                const params = url.searchParams;

                // Prefer explicit query parameters
                const queryKeys = ['code', 'invite', 'inv', 'i'];
                for (const key of queryKeys) {
                    const value = params.get(key);
                    if (value) return value;
                }

                // Fallback: last non-empty path segment after /vs/
                const parts = url.pathname.split('/').filter(Boolean);
                const vsIndex = parts.indexOf('vs');
                if (vsIndex !== -1 && parts.length > vsIndex + 1) {
                    return parts[vsIndex + 1];
                }
            } catch (e) {
                // Ignore parse errors, just treat as no invite code
            }
            return null;
        }

        function setupInvitePage() {
            const inviteCode = getInviteCodeFromUrl();
            const inviteSection = document.getElementById('invite-section');
            const inviteCodeSpan = document.getElementById('invite-code');
            const copyButton = document.getElementById('copy-invite-button');
            const copyStatus = document.getElementById('copy-status');
            const downloadButton = document.getElementById('download-echo-button');

            if (inviteCode) {
                inviteCodeSpan.textContent = inviteCode;
                inviteSection.style.display = 'block';

                copyButton.addEventListener('click', async () => {
                    copyStatus.textContent = '';
                    try {
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            await navigator.clipboard.writeText(inviteCode);
                        } else {
                            // Fallback for older browsers
                            const tempInput = document.createElement('input');
                            tempInput.value = inviteCode;
                            document.body.appendChild(tempInput);
                            tempInput.select();
                            document.execCommand('copy');
                            document.body.removeChild(tempInput);
                        }
                        copyStatus.textContent = 'Invite code copied to clipboard.';
                    } catch (err) {
                        copyStatus.textContent = 'Unable to copy automatically. Please copy the code manually.';
                    }
                });
            }

            downloadButton.addEventListener('click', () => {
                window.location.href = 'https://apps.apple.com/us/app/echobeats/id6477832538';
            });
        }

        document.addEventListener('DOMContentLoaded', setupInvitePage);
    </script>
</body>
</html>
